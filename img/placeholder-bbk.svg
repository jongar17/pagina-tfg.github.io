<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" width="800" height="500">
  <defs>
    <pattern id="puntos" patternUnits="userSpaceOnUse" width="25" height="25">
      <circle cx="12" cy="12" r="1.2" fill="#4a0080" opacity="0.5"/>
    </pattern>
    <linearGradient id="fondo" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0030"/>
      <stop offset="100%" style="stop-color:#5c1090"/>
    </linearGradient>
    <radialGradient id="foco1" cx="30%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#e84b2f;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#e84b2f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="foco2" cx="70%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#7b1fa2;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7b1fa2;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="foco3" cx="50%" cy="90%" r="35%">
      <stop offset="0%" style="stop-color:#f5c800;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f5c800;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Fondo oscuro de concierto -->
  <rect width="800" height="500" fill="url(#fondo)"/>
  <rect width="800" height="500" fill="url(#puntos)"/>

  <!-- Focos de colores desde abajo -->
  <ellipse cx="240" cy="500" rx="300" ry="250" fill="url(#foco1)"/>
  <ellipse cx="560" cy="500" rx="300" ry="250" fill="url(#foco2)"/>
  <ellipse cx="400" cy="500" rx="250" ry="200" fill="url(#foco3)"/>

  <!-- Silueta de montaña / Kobetamendi abstracto -->
  <polygon points="0,420 150,300 250,340 350,260 450,300 550,240 650,290 750,310 800,350 800,500 0,500" fill="#0d0020" opacity="0.7"/>

  <!-- Líneas de sonido / ondas -->
  <ellipse cx="400" cy="420" rx="60" ry="20" fill="none" stroke="#e84b2f" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="400" cy="420" rx="120" ry="40" fill="none" stroke="#e84b2f" stroke-width="1" opacity="0.3"/>
  <ellipse cx="400" cy="420" rx="190" ry="65" fill="none" stroke="#e84b2f" stroke-width="1" opacity="0.2"/>
  <ellipse cx="400" cy="420" rx="270" ry="95" fill="none" stroke="#e84b2f" stroke-width="0.8" opacity="0.15"/>

  <!-- Estrella/destello central -->
  <circle cx="400" cy="420" r="8" fill="#f5c800" opacity="0.8"/>
  <line x1="400" y1="380" x2="400" y2="355" stroke="#f5c800" stroke-width="1.5" opacity="0.5"/>
  <line x1="360" y1="400" x2="340" y2="390" stroke="#f5c800" stroke-width="1.5" opacity="0.5"/>
  <line x1="440" y1="400" x2="460" y2="390" stroke="#f5c800" stroke-width="1.5" opacity="0.5"/>

  <!-- Número grande -->
  <text x="400" y="270" font-family="Georgia, serif" font-size="180" font-weight="900" fill="#3d0070" opacity="0.4" text-anchor="middle" dominant-baseline="middle">20</text>

  <!-- Etiqueta de sección -->
  <rect x="40" y="40" width="175" height="28" fill="#7b1fa2"/>
  <text x="52" y="58" font-family="monospace" font-size="11" fill="#f5f2ec" letter-spacing="2">NUESTRA CULTURA</text>

  <!-- Logotipo BETA pequeño -->
  <text x="760" y="58" font-family="Georgia, serif" font-size="22" font-weight="900" fill="#f5f2ec" opacity="0.4" text-anchor="end">BETA.</text>

  <!-- Titular -->
  <text x="400" y="140" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#f5f2ec" text-anchor="middle" opacity="0.95">BBK Live · 20 ediciones</text>
  <text x="400" y="175" font-family="Georgia, serif" font-size="18" fill="#d4a0f0" text-anchor="middle" opacity="0.85">9–11 julio · Kobetamendi · Bilbao</text>

  <!-- Línea decorativa inferior -->
  <rect x="0" y="485" width="800" height="15" fill="#e84b2f" opacity="0.7"/>
</svg>

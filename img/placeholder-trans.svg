<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" width="800" height="500">
  <defs>
    <pattern id="patron" patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#6b0f35" stroke-width="0.8" opacity="0.4"/>
    </pattern>
    <linearGradient id="fondo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d0a1f"/>
      <stop offset="100%" style="stop-color:#7b1a4a"/>
    </linearGradient>
    <radialGradient id="centro" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ad1457;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2d0a1f;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="500" fill="url(#fondo)"/>
  <rect width="800" height="500" fill="url(#patron)"/>
  <ellipse cx="400" cy="250" rx="350" ry="280" fill="url(#centro)"/>

  <!-- Símbolo trans abstracto / formas geométricas -->
  <!-- Cruz médica / cruz de salud simplificada -->
  <rect x="375" y="160" width="50" height="160" rx="4" fill="#ad1457" opacity="0.25"/>
  <rect x="320" y="215" width="160" height="50" rx="4" fill="#ad1457" opacity="0.25"/>

  <!-- Círculos concéntricos decorativos -->
  <circle cx="400" cy="250" r="180" fill="none" stroke="#ad1457" stroke-width="1" opacity="0.2"/>
  <circle cx="400" cy="250" r="130" fill="none" stroke="#ad1457" stroke-width="1" opacity="0.15"/>
  <circle cx="400" cy="250" r="80" fill="none" stroke="#e84b2f" stroke-width="1.5" opacity="0.2"/>

  <!-- Triángulo decorativo (símbolo de visibilidad) -->
  <polygon points="400,170 480,310 320,310" fill="none" stroke="#f5a0c0" stroke-width="1.5" opacity="0.2"/>

  <!-- Número / dato decorativo -->
  <text x="400" y="290" font-family="Georgia, serif" font-size="120" font-weight="900" fill="#7b1a4a" opacity="0.3" text-anchor="middle" dominant-baseline="middle">♥</text>

  <!-- Etiqueta de sección -->
  <rect x="40" y="40" width="120" height="28" fill="#ad1457"/>
  <text x="52" y="58" font-family="monospace" font-size="11" fill="#f5f2ec" letter-spacing="2">COLECTIVO</text>

  <!-- Logotipo BETA pequeño -->
  <text x="760" y="58" font-family="Georgia, serif" font-size="22" font-weight="900" fill="#f5f2ec" opacity="0.4" text-anchor="end">BETA.</text>

  <!-- Titular -->
  <text x="400" y="155" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#f5f2ec" text-anchor="middle" opacity="0.9">Personas trans y Osakidetza</text>
  <text x="400" y="186" font-family="Georgia, serif" font-size="16" fill="#f0a0c0" text-anchor="middle" opacity="0.8">Atención hecha con ellas, no para ellas</text>

  <!-- Línea decorativa inferior -->
  <rect x="0" y="485" width="800" height="15" fill="#e84b2f" opacity="0.7"/>
</svg>

<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" width="800" height="500">
  <defs>
    <!-- Patrón de líneas diagonales -->
    <pattern id="patron" patternUnits="userSpaceOnUse" width="40" height="40" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#163028" stroke-width="1"/>
    </pattern>
    <!-- Gradiente de fondo -->
    <linearGradient id="fondo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2a20"/>
      <stop offset="100%" style="stop-color:#1a5c3a"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="800" height="500" fill="url(#fondo)"/>
  <rect width="800" height="500" fill="url(#patron)" opacity="0.3"/>

  <!-- Elemento gráfico: bloques de edificios abstractos -->
  <rect x="80" y="220" width="60" height="200" fill="#0f2a20" opacity="0.6"/>
  <rect x="155" y="170" width="80" height="250" fill="#0f2a20" opacity="0.5"/>
  <rect x="250" y="200" width="50" height="220" fill="#0f2a20" opacity="0.6"/>
  <rect x="615" y="190" width="70" height="230" fill="#0f2a20" opacity="0.5"/>
  <rect x="700" y="230" width="55" height="190" fill="#0f2a20" opacity="0.6"/>

  <!-- Línea de suelo -->
  <line x1="0" y1="420" x2="800" y2="420" stroke="#1a5c3a" stroke-width="1.5" opacity="0.5"/>

  <!-- Número grande decorativo -->
  <text x="400" y="310" font-family="Georgia, serif" font-size="220" font-weight="900" fill="#1a5c3a" opacity="0.25" text-anchor="middle" dominant-baseline="middle">€</text>

  <!-- Etiqueta de sección -->
  <rect x="40" y="40" width="200" height="28" fill="#1a5c3a"/>
  <text x="52" y="58" font-family="monospace" font-size="11" fill="#f5f2ec" letter-spacing="2" text-transform="uppercase">ECONOMÍA NUESTRA</text>

  <!-- Logotipo BETA pequeño -->
  <text x="760" y="58" font-family="Georgia, serif" font-size="22" font-weight="900" fill="#f5f2ec" opacity="0.4" text-anchor="end">BETA.</text>

  <!-- Titular en el placeholder -->
  <text x="400" y="160" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#f5f2ec" text-anchor="middle" opacity="0.9">Vivienda en Euskadi</text>
  <text x="400" y="195" font-family="Georgia, serif" font-size="18" fill="#a8d5c0" text-anchor="middle" opacity="0.8">300€ al mes no llegan a fin de mes</text>

  <!-- Línea decorativa inferior -->
  <rect x="0" y="485" width="800" height="15" fill="#e84b2f" opacity="0.7"/>
</svg>

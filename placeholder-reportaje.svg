<svg viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" width="1200" height="500">
  <defs>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="50" height="50">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a0800" stroke-width="0.8" opacity="0.5"/>
    </pattern>
    <linearGradient id="fondo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a09"/>
      <stop offset="60%" style="stop-color:#1a0e00"/>
      <stop offset="100%" style="stop-color:#2d1500"/>
    </linearGradient>
    <radialGradient id="brillo" cx="60%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#e84b2f;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e84b2f;stop-opacity:0"/>
    </radialGradient>
    <!-- Efecto de código / matriz -->
    <pattern id="codigo" patternUnits="userSpaceOnUse" width="80" height="20">
      <text x="0" y="15" font-family="monospace" font-size="10" fill="#e84b2f" opacity="0.08">01101001 10110</text>
    </pattern>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="500" fill="url(#fondo)"/>
  <rect width="1200" height="500" fill="url(#grid)"/>
  <rect width="1200" height="500" fill="url(#codigo)"/>
  <rect width="1200" height="500" fill="url(#brillo)"/>

  <!-- Circuito / red de nodos -->
  <!-- Líneas de conexión -->
  <line x1="100" y1="150" x2="300" y2="250" stroke="#e84b2f" stroke-width="1" opacity="0.15"/>
  <line x1="300" y1="250" x2="500" y2="180" stroke="#e84b2f" stroke-width="1" opacity="0.15"/>
  <line x1="500" y1="180" x2="700" y2="300" stroke="#e84b2f" stroke-width="1" opacity="0.12"/>
  <line x1="700" y1="300" x2="900" y2="200" stroke="#e84b2f" stroke-width="1" opacity="0.15"/>
  <line x1="900" y1="200" x2="1100" y2="350" stroke="#e84b2f" stroke-width="1" opacity="0.12"/>
  <line x1="200" y1="380" x2="400" y2="320" stroke="#e84b2f" stroke-width="0.8" opacity="0.1"/>
  <line x1="400" y1="320" x2="600" y2="400" stroke="#e84b2f" stroke-width="0.8" opacity="0.1"/>
  <line x1="800" y1="130" x2="1000" y2="260" stroke="#e84b2f" stroke-width="0.8" opacity="0.1"/>

  <!-- Nodos -->
  <circle cx="100" cy="150" r="5" fill="#e84b2f" opacity="0.3"/>
  <circle cx="300" cy="250" r="8" fill="#e84b2f" opacity="0.4"/>
  <circle cx="500" cy="180" r="5" fill="#e84b2f" opacity="0.3"/>
  <circle cx="700" cy="300" r="10" fill="#e84b2f" opacity="0.5"/>
  <circle cx="900" cy="200" r="6" fill="#e84b2f" opacity="0.35"/>
  <circle cx="1100" cy="350" r="5" fill="#e84b2f" opacity="0.3"/>
  <circle cx="200" cy="380" r="4" fill="#e84b2f" opacity="0.25"/>
  <circle cx="1000" cy="130" r="7" fill="#e84b2f" opacity="0.35"/>

  <!-- Texto de código de fondo -->
  <text x="50" y="100" font-family="monospace" font-size="12" fill="#e84b2f" opacity="0.06">if (alumno.usa(IA)) { aprendizaje = "superficial"; }</text>
  <text x="200" y="440" font-family="monospace" font-size="12" fill="#e84b2f" opacity="0.06">const riesgo = cognitivo.esfuerzo * 0.527;</text>
  <text x="700" y="80" font-family="monospace" font-size="12" fill="#e84b2f" opacity="0.06">docente.percepcion !== alumno.percepcion;</text>

  <!-- Número central grande -->
  <text x="600" y="310" font-family="Georgia, serif" font-size="260" font-weight="900"
        fill="#1a0800" opacity="0.5" text-anchor="middle" dominant-baseline="middle">76%</text>

  <!-- Etiqueta reportaje -->
  <rect x="40" y="40" width="180" height="30" fill="#e84b2f"/>
  <text x="54" y="60" font-family="monospace" font-size="11" fill="#f5f2ec" letter-spacing="2.5">REPORTAJE MULTIMEDIA</text>

  <!-- Logotipo BETA -->
  <text x="1160" y="60" font-family="Georgia, serif" font-size="28" font-weight="900" fill="#f5f2ec" opacity="0.35" text-anchor="end">BETA.</text>

  <!-- Titular principal -->
  <text x="600" y="155" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#f5f2ec" text-anchor="middle" opacity="0.95">IA en las aulas vascas</text>
  <text x="600" y="198" font-family="Georgia, serif" font-size="20" fill="#f0a080" text-anchor="middle" opacity="0.8">¿Herramienta del futuro o atajo del presente?</text>

  <!-- Datos clave en la parte inferior -->
  <rect x="0" y="420" width="1200" height="65" fill="#0a0a09" opacity="0.7"/>

  <text x="200" y="448" font-family="monospace" font-size="10" fill="#e84b2f" text-anchor="middle" letter-spacing="1">ALUMNADO USA IA</text>
  <text x="200" y="468" font-family="Georgia, serif" font-size="22" font-weight="900" fill="#f5f2ec" text-anchor="middle">76,3%</text>

  <line x1="400" y1="428" x2="400" y2="476" stroke="#333" stroke-width="1" opacity="0.5"/>

  <text x="600" y="448" font-family="monospace" font-size="10" fill="#e84b2f" text-anchor="middle" letter-spacing="1">SIN ORIENTACIÓN DOCENTE</text>
  <text x="600" y="468" font-family="Georgia, serif" font-size="22" font-weight="900" fill="#f5f2ec" text-anchor="middle">63,1%</text>

  <line x1="800" y1="428" x2="800" y2="476" stroke="#333" stroke-width="1" opacity="0.5"/>

  <text x="1000" y="448" font-family="monospace" font-size="10" fill="#e84b2f" text-anchor="middle" letter-spacing="1">PREOCUPACIÓN DOCENTE</text>
  <text x="1000" y="468" font-family="Georgia, serif" font-size="22" font-weight="900" fill="#f5f2ec" text-anchor="middle">4,73 / 5</text>

  <!-- Línea decorativa inferior -->
  <rect x="0" y="485" width="1200" height="15" fill="#e84b2f" opacity="0.9"/>
</svg>
